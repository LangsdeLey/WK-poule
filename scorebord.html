<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorebord – WK Poule 2026 – Langs de Ley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d2a54; --navy-light: #1a3d73; --gold: #c9952a;
    --gold-light: #f0b93a; --white: #ffffff; --off-white: #f7f5f0;
    --gray: #e8e4dc; --text: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text); }

  header { background: var(--navy); position: relative; overflow: hidden; }
  header::before { content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 20% 50%, rgba(201,149,42,.15) 0%, transparent 60%); }
  .header-inner { max-width:900px; margin:0 auto; padding:24px 20px 20px;
    display:flex; flex-direction:column; align-items:center; gap:14px; position:relative; z-index:1; }
  .logo-wrap { background:white; border-radius:14px; padding:12px 22px;
    box-shadow:0 6px 28px rgba(0,0,0,.35); }
  .logo-wrap img { height:90px; width:auto; display:block; }
  .header-title { text-align:center; }
  .header-title h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.4rem,7vw,3.8rem);
    color:white; letter-spacing:.06em; line-height:.95; }
  .header-title h1 span { color:var(--gold-light); }
  .header-title p { color:rgba(255,255,255,.7); font-size:.95rem; margin-top:5px; }
  .gold-bar { height:4px; background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent); }

  .container { max-width:900px; margin:0 auto; padding:24px 16px 40px; }

  .update-badge { text-align:center; margin-bottom:20px; }
  .update-badge span { background:var(--navy); color:rgba(255,255,255,.7);
    font-size:.8rem; padding:6px 16px; border-radius:20px; display:inline-block; }
  .update-badge strong { color:var(--gold-light); }

  /* NAV LINKS */
  .nav-links { display:flex; gap:10px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
  .nav-links a { background:var(--navy); color:white; padding:8px 18px; border-radius:20px;
    text-decoration:none; font-size:.85rem; font-weight:600; letter-spacing:.03em;
    transition:background .2s; }
  .nav-links a:hover { background:var(--gold); color:var(--navy); }
  .nav-links a.active { background:var(--gold); color:var(--navy); }

  /* TABLE */
  .table-wrap { background:white; border-radius:16px; overflow:hidden;
    box-shadow:0 2px 16px rgba(13,42,84,.08); overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:560px; }
  thead tr { background:var(--navy); }
  thead th { padding:12px 14px; color:white; font-size:.82rem; font-weight:700;
    letter-spacing:.05em; text-align:center; text-transform:uppercase; }
  thead th.left { text-align:left; }
  tbody tr { border-bottom:1px solid var(--gray); transition:background .15s; }
  tbody tr:hover { background:#f0eee8; }
  tbody tr.rank-1 { background:#fff8e1; }
  tbody tr.rank-2 { background:#f5f5f5; }
  tbody tr.rank-3 { background:#fdf1e0; }
  tbody td { padding:11px 14px; font-size:.9rem; text-align:center; }
  tbody td.left { text-align:left; font-weight:600; }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; border-radius:50%; font-weight:700; font-size:.85rem; }
  .rank-1 .rank-badge { background:#FFD700; color:#5C3D00; }
  .rank-2 .rank-badge { background:#C0C0C0; color:#333; }
  .rank-3 .rank-badge { background:#CD7F32; color:white; }
  .prize { font-size:.8rem; color:var(--gold); font-weight:700; }
  .total { font-weight:700; color:var(--navy); font-size:1rem; }
  .tiebreak { font-size:.8rem; color:#888; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:#aaa; }
  .empty-state .icon { font-size:3rem; margin-bottom:12px; }
  .empty-state p { font-size:.95rem; }

  footer { background:var(--navy); color:rgba(255,255,255,.5); text-align:center;
    padding:18px; font-size:.8rem; margin-top:20px; }
  footer strong { color:var(--gold); }

  @media(max-width:500px) {
    thead th, tbody td { padding:8px 8px; font-size:.78rem; }
  }
</style>
</head>

if (deelnemers.length === 0) {
  tbody.innerHTML = `<tr><td colspan="9">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <p>De stand wordt gepubliceerd zodra de eerste speelronde gespeeld is.<br>
         Kom later terug!</p>
    </div>
  </td></tr>`;
} else {
  // Sort by totaal desc, then tiebreak asc (closest to actual)
  deelnemers.sort((a,b) => b.totaal - a.totaal || a.tiebreak - b.tiebreak);

  deelnemers.forEach((d, i) => {
    const rank = i + 1;
    const rc = rankClass[i] || "";
    const badge = `<span class="rank-badge">${rank}</span>`;
    const prize = prizes[i] || "";
    tbody.innerHTML += `
      <tr class="${rc}">
        <td>${badge}</td>
        <td class="left">${d.naam}</td>
        <td>${d.app}</td>
        <td>${d.nl ?? "–"}</td>
        <td>${d.groepen ?? "–"}</td>
        <td>${d.ko ?? "–"}</td>
        <td class="total">${d.totaal ?? "–"}</td>
        <td class="tiebreak">${d.tiebreak ?? "–"}</td>
        <td class="prize">${prize}</td>
      </tr>`;
  });
}
</script>

</body>
</html>
